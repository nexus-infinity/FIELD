# 🔷 ATLAS-Field Integration Configuration
# Repository: nexus-infinity/ATLAS-field
# Description: Sacred system architecture implementing cybernetic principles with bidirectional feedback loops
# Integration Point: ⬡_integration/●traefik_gateway

# GitHub Repository Information
repository:
  owner: "nexus-infinity"
  name: "ATLAS-field"
  clone_url: "https://github.com/nexus-infinity/ATLAS-field.git"
  branch: "main"
  description: "A sacred system architecture implementing cybernetic principles with bidirectional feedback loops"
  last_updated: "2025-06-20T09:26:40Z"

# Field Integration Settings
integration:
  frequency: "741Hz"  # Insight & Integration
  location: "⬡_integration/●traefik_gateway"
  purpose: "Unified gateway for DOJO ↔ Walkerville ↔ ATLAS-field integration"
  
  # Cybernetic Feedback Loop Configuration
  feedback_loops:
    bidirectional: true
    sacred_architecture: true
    cybernetic_principles: true
    
  # Gateway Integration Points
  endpoints:
    - path: "/atlas"
      service: "atlas-field-sync" 
      description: "ATLAS field synchronization endpoint"
      
    - path: "/sacred"
      service: "sacred-architecture"
      description: "Sacred system architecture access"
      
    - path: "/cybernetic"
      service: "cybernetic-feedback"
      description: "Cybernetic principles feedback loop"

# Traefik Service Configuration
services:
  atlas-field-sync:
    url: "http://localhost:8741"  # 741Hz frequency port
    health_check:
      path: "/health"
      interval: "30s"
      
  sacred-architecture:
    url: "http://localhost:8528"  # 528Hz frequency port  
    health_check:
      path: "/sacred/status"
      interval: "30s"
      
  cybernetic-feedback:
    url: "http://localhost:8963"  # 963Hz frequency port
    health_check:
      path: "/cybernetic/feedback"
      interval: "30s"

# Middleware for ATLAS Integration
middleware:
  atlas-headers:
    headers:
      customRequestHeaders:
        X-Atlas-Integration: "active"
        X-Sacred-Architecture: "enabled"
        X-Cybernetic-Feedback: "bidirectional"
        X-Field-Frequency: "741Hz"
        
  atlas-auth:
    # Placeholder for future GitHub integration auth
    headers:
      customRequestHeaders:
        X-GitHub-Integration: "nexus-infinity/ATLAS-field"
        
# Routing Rules for ATLAS Integration
routes:
  atlas-main:
    rule: "Host(`atlas.local`)"
    service: "atlas-field-sync"
    middlewares:
      - "cors-headers"
      - "atlas-headers"
      
  atlas-sacred:
    rule: "Host(`atlas.local`) && PathPrefix(`/sacred`)"
    service: "sacred-architecture"
    middlewares:
      - "cors-headers"
      - "atlas-headers"
      - "atlas-auth"
      
  atlas-cybernetic:
    rule: "Host(`atlas.local`) && PathPrefix(`/cybernetic`)"
    service: "cybernetic-feedback" 
    middlewares:
      - "cors-headers"
      - "atlas-headers"
      - "atlas-auth"

# Clone and Setup Instructions
setup:
  clone_command: "git clone https://github.com/nexus-infinity/ATLAS-field.git"
  local_path: "/Users/jbear/FIELD/⬡_integration/●atlas_field"
  integration_steps:
    1: "Clone ATLAS-field repository to integration directory"
    2: "Configure sacred system architecture endpoints"  
    3: "Establish cybernetic feedback loops"
    4: "Connect bidirectional data flows"
    5: "Test integration through Traefik gateway"
    6: "Validate sacred architecture principles"